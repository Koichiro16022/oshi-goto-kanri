<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>推し事管理 - OSHI-GOTO Management</title>
    <style>
        :root { --primary-color: #ff6b6b; --bg-color: #f8f9fa; --edit-color: #2196f3; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        .main-wrapper { display: flex; flex-direction: row; gap: 20px; padding: 20px; max-width: 900px; width: 100%; box-sizing: border-box; }
        @media (max-width: 750px) { .main-wrapper { flex-direction: column; align-items: center; } }

        .toggle-settings-btn { background: #555; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 13px; margin: 10px 0; font-weight: bold; }
        #settings-area { display: none; width: 100%; }

        .panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box; width: 100%; }

        #collection-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 10px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .collection-item { width: 100%; aspect-ratio: 1/1; border-radius: 10px; overflow: hidden; border: 2px solid #eee; position: relative; }
        .collection-item img { width: 100%; height: 100%; object-fit: cover; }
        .delete-img { position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; cursor: pointer; font-size: 12px; }

        input, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .row-group { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
        .row-group label { font-size: 12px; color: #666; white-space: nowrap; }

        #add-btn { width: 100%; background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.2s; }
        #add-btn.edit-mode { background: var(--edit-color); }

        ul { list-style: none; padding: 0; margin: 0; width: 100%; }
        li { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 3px 6px rgba(0,0,0,0.04); gap: 12px; border-left: 15px solid var(--primary-color); }

        .btn-group { display: flex; gap: 8px; }
        .complete-btn { background: #4caf50; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .edit-task-btn { background: var(--edit-color); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .delete-task-btn { background: #888; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .notify-done-badge { font-size: 10px; color: #fff; background: #bbb; border-radius: 10px; padding: 2px 7px; margin-top: 3px; display: inline-block; }

        /* [FIX #19] オーバーレイはクリックで閉じられるようにpointer-eventsを有効化 */
        #praise-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; cursor: pointer; }
        .praise-card { max-width: 85vw; max-height: 85vh; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 0 50px var(--primary-color); position: relative; z-index: 2001; animation: popInOut 4.5s ease-in-out forwards; display: flex; align-items: center; justify-content: center; }
        @keyframes popInOut { 0% { transform: scale(0.6); opacity: 0; } 10% { transform: scale(1); opacity: 1; } 90% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0; } }
        #praise-img { max-width: 85vw; max-height: 85vh; width: auto; height: auto; display: block; }
        .shower-word { position: fixed; color: white; font-weight: bold; font-size: 1.8rem; text-shadow: 0 0 10px rgba(255,107,107,0.8), 2px 2px 4px #000; z-index: 2002; white-space: nowrap; pointer-events: none; animation: showerFall 2.2s ease-out forwards; }
        @keyframes showerFall { 0% { transform: scale(0.5); opacity: 0; } 20% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1) translateY(-120px); opacity: 0; } }
        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 2100; }

        /* [FIX #15] 日時未入力警告 */
        .warn-msg { color: #e65100; font-size: 12px; margin-top: 4px; display: none; }

        /* [FIX] 画像読み込み中のプログレス表示 */
        #img-loading { font-size: 12px; color: #888; margin-top: 4px; display: none; }

        /* アーカイブセクション */
        .archive-section { width: 100%; }
        .archive-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .archive-header h3 { margin: 0; color: #888; font-size: 1rem; flex: 1; }
        .toggle-archive-btn { background: #888; color: white; border: none; padding: 6px 14px; border-radius: 15px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .clear-archive-btn { background: #888; border: none; color: white; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 11px; font-weight: bold; }
        #archive-list { list-style: none; padding: 0; margin: 0; width: 100%; }
        #archive-list li { background: #f5f5f5; padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; border-left: 15px solid #bbb; opacity: 0.85; }
        .archive-btn-group { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
        .restore-btn { background: #e8f5e9; border: 1px solid #a5d6a7; color: #388e3c; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; white-space: nowrap; font-weight: bold; }
        .restore-btn:hover { background: #c8e6c9; }
        .archive-delete-btn { background: #888; border: none; color: white; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; white-space: nowrap; font-weight: bold; }
        .archive-delete-btn:hover { background: #666; }
        .archive-delete-note { font-size: 9px; color: #333; text-align: center; }
        .completed-at { font-size: 10px; color: #bbb; margin-top: 2px; }

        /* おやすみモード */
        .quiet-toggle-btn { border: none; padding: 6px 18px; border-radius: 15px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .quiet-toggle-btn.off { background: #ddd; color: #888; }
        .quiet-toggle-btn.on  { background: #5c6bc0; color: white; }

        /* データ管理ボタン */
        .data-mgmt-btn { background: #555; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .data-mgmt-btn:hover { background: #333; }

        /* 背景色カスタマイズ */
        .color-swatches { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid #ddd; transition: transform 0.15s, border-color 0.15s; flex-shrink: 0; }
        .color-swatch:hover { transform: scale(1.2); }
        .color-swatch.active { border-color: #555; box-shadow: 0 0 0 2px #555; transform: scale(1.1); }
        .bg-color-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        #bg-color-input { width: 36px; height: 30px; padding: 2px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; }

        /* セリフ管理UI */
        /* 推し管理 */
        .oshi-swatches .color-swatch { border: none !important; box-shadow: none !important; }
        .oshi-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #f9f9f9; border-radius: 10px; margin-bottom: 6px; }
        .oshi-color-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #ddd; flex-shrink: 0; }
        .oshi-name { flex: 1; font-size: 13px; font-weight: bold; }
        .oshi-main-btn { background: #f0c040; color: #333; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .oshi-delete-btn { background: #888; color: white; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; white-space: nowrap; }

        .phrase-section-header { display: flex; align-items: center; gap: 10px; }
        .phrase-section-header label { flex: 1; margin: 0; }
        .toggle-phrase-btn { background: #888; color: white; border: none; padding: 6px 14px; border-radius: 15px; cursor: pointer; font-size: 12px; font-weight: bold; white-space: nowrap; }
        .clear-phrase-btn { background: #888; color: white; border: none; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .phrase-input-row { display: flex; gap: 8px; margin-top: 8px; }
        .phrase-add-btn { background: var(--primary-color); color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; white-space: nowrap; }
        .phrase-add-btn:hover { opacity: 0.85; }
        .phrase-list { list-style: none; padding: 0; margin: 8px 0 0 0; }
        .phrase-list li { display: flex; align-items: center; gap: 6px; padding: 7px 10px; background: #f9f9f9; border-radius: 8px; margin-bottom: 5px; font-size: 13px; }
        .phrase-list li span { flex: 1; word-break: break-all; }
        .phrase-edit-btn { background: var(--edit-color); color: white; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .phrase-delete-btn { background: #888; color: white; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; white-space: nowrap; }

        /* カウントダウンエリア */
        #countdown-area { width: 100%; max-width: 900px; padding: 10px 20px 0; box-sizing: border-box; }
        .countdown-card { background: linear-gradient(135deg, #e05a7a, #ff9a9a); color: white; border-radius: 15px; padding: 18px 24px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.2); transition: background 0.5s; }
        #countdown-label { font-size: 0.95rem; font-weight: bold; margin-bottom: 6px; opacity: 0.92; }
        #countdown-timer { font-size: 2rem; font-weight: bold; letter-spacing: 3px; line-height: 1; }
        #countdown-tasks { font-size: 0.82rem; margin-top: 8px; opacity: 0.88; }

        /* メインイベントチェックボックス行 */
        .main-event-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
        .main-event-row input[type="checkbox"] { width: auto; margin: 0; cursor: pointer; accent-color: var(--primary-color); width: 16px; height: 16px; }
        .main-event-row label { font-size: 13px; color: #555; cursor: pointer; font-weight: bold; user-select: none; }
    </style>
</head>
<body>

<canvas id="fireworks"></canvas>
<div id="praise-overlay"><div class="praise-card"><img id="praise-img" src="" alt="推し画像"></div></div>

<button class="toggle-settings-btn" onclick="toggleSettings()">⚙️ 設定（画像やセリフ）</button>

<div id="countdown-area" style="display:none;">
    <div class="countdown-card">
        <div id="countdown-label"></div>
        <div id="countdown-timer"></div>
        <div id="countdown-tasks"></div>
    </div>
</div>

<div class="main-wrapper">
    <div class="left-column" id="settings-area">
        <div class="panel">
            <div style="border-bottom:1px solid #eee; padding-bottom:20px; margin-bottom:20px;">
                <label style="font-weight:bold; font-size:14px;">👑 推し管理 <span style="font-weight:normal; font-size:12px; color:#999;">（最大5人）</span></label>
                <div class="color-swatches oshi-swatches" style="margin-top:10px;">
                    <div class="color-swatch" style="background:#888888;" title="グレー"  onclick="setOshiColor('#888888')"></div>
                    <div class="color-swatch" style="background:#FF0000;" title="赤"      onclick="setOshiColor('#FF0000')"></div>
                    <div class="color-swatch" style="background:#FF66CC;" title="ピンク"  onclick="setOshiColor('#FF66CC')"></div>
                    <div class="color-swatch" style="background:#FF6600;" title="オレンジ" onclick="setOshiColor('#FF6600')"></div>
                    <div class="color-swatch" style="background:#FFFF00;" title="黄色"    onclick="setOshiColor('#FFFF00')"></div>
                    <div class="color-swatch" style="background:#00B050;" title="緑"      onclick="setOshiColor('#00B050')"></div>
                    <div class="color-swatch" style="background:#00B0F0;" title="水色"    onclick="setOshiColor('#00B0F0')"></div>
                    <div class="color-swatch" style="background:#0070C0;" title="青"      onclick="setOshiColor('#0070C0')"></div>
                    <div class="color-swatch" style="background:#7030A0;" title="紫"      onclick="setOshiColor('#7030A0')"></div>
                </div>
                <div class="phrase-input-row" style="margin-top:8px;">
                    <input type="text" id="oshi-name-input" placeholder="推しの名前" style="flex:1; margin-top:0;">
                    <input type="color" id="oshi-color-input" value="#e91e63" style="width:42px; height:42px; padding:2px; border:1px solid #ddd; border-radius:6px; cursor:pointer; margin-top:0; flex-shrink:0;">
                    <button id="oshi-add-btn" class="phrase-add-btn" onclick="addOshi()">追加</button>
                </div>
                <div id="oshi-list" style="margin-top:10px;"></div>
            </div>
            <label style="font-weight:bold; font-size:14px;">📸 推し画像コレクション<span style="font-weight:normal; font-size:12px; color:#999;">（10枚まで保存できます）</span></label>
            <!-- [FIX #20] multiple属性を追加して複数選択に対応 -->
            <input type="file" accept="image/*" id="file-input" multiple style="margin-top:10px;">
            <div id="img-loading">📷 画像を処理中...</div>
            <div id="collection-container"></div>
            <div style="margin-top:12px;">
                <button onclick="resetImages()" style="font-size:10px; background:none; border:1px solid #ccc; cursor:pointer; padding:5px 10px; border-radius:6px;">🖼️ 画像を一括リセット</button>
            </div>
            <div style="margin-top:20px;">
                <label style="font-weight:bold; font-size:14px;">🎨 背景色</label>
                <div class="color-swatches">
                    <div class="color-swatch" data-color="#f8f9fa" title="デフォルト" style="background:#f8f9fa;"></div>
                    <div class="color-swatch" data-color="#ffffff" title="白" style="background:#ffffff;"></div>
                    <div class="color-swatch" data-color="#ffe0e0" title="赤" style="background:#ffe0e0;"></div>
                    <div class="color-swatch" data-color="#ffe0f0" title="ピンク" style="background:#ffe0f0;"></div>
                    <div class="color-swatch" data-color="#fff0e0" title="オレンジ" style="background:#fff0e0;"></div>
                    <div class="color-swatch" data-color="#fffde0" title="黄色" style="background:#fffde0;"></div>
                    <div class="color-swatch" data-color="#e0ffe0" title="緑" style="background:#e0ffe0;"></div>
                    <div class="color-swatch" data-color="#e0eeff" title="青" style="background:#e0eeff;"></div>
                    <div class="color-swatch" data-color="#f0e0ff" title="紫" style="background:#f0e0ff;"></div>
                </div>
                <div class="bg-color-row">
                    <label style="font-size:12px; color:#666;">カスタム:</label>
                    <input type="color" id="bg-color-input" value="#f8f9fa">
                </div>
            </div>
            <div style="margin-top:20px;">
                <div class="phrase-section-header">
                    <label style="font-weight:bold; font-size:14px;">💬 褒め言葉 <span style="font-weight:normal; font-size:12px; color:#999;">（20個まで保存できます）</span></label>
                    <button class="clear-phrase-btn" onclick="clearPhrases('praise')">全削除</button>
                    <button class="toggle-phrase-btn" id="toggle-praise-btn" onclick="togglePhrase('praise')">▼ 表示</button>
                </div>
                <div id="praise-phrase-body" style="display:none;">
                    <div class="phrase-input-row">
                        <input type="text" id="praise-new-input" placeholder="例：天才！" style="flex:1; margin-top:0;">
                        <button class="phrase-add-btn" onclick="addPhrase('praise')">登録</button>
                    </div>
                    <ul id="praise-phrase-list" class="phrase-list"></ul>
                </div>
            </div>
            <div style="margin-top:16px;">
                <div class="phrase-section-header">
                    <label style="font-weight:bold; font-size:14px;">⏰ リマインダー <span style="font-weight:normal; font-size:12px; color:#999;">（20個まで保存できます）</span></label>
                    <button class="clear-phrase-btn" onclick="clearPhrases('remind')">全削除</button>
                    <button class="toggle-phrase-btn" id="toggle-remind-btn" onclick="togglePhrase('remind')">▼ 表示</button>
                </div>
                <div id="remind-phrase-body" style="display:none;">
                    <div class="phrase-input-row">
                        <input type="text" id="remind-new-input" placeholder="例：時間だよ！" style="flex:1; margin-top:0;">
                        <button class="phrase-add-btn" onclick="addPhrase('remind')">登録</button>
                    </div>
                    <ul id="remind-phrase-list" class="phrase-list"></ul>
                </div>
            </div>
            <div style="margin-top:20px; border-top:1px solid #eee; padding-top:16px;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <label style="font-weight:bold; font-size:14px; flex:1;">🌙 おやすみモード</label>
                    <button id="quiet-mode-toggle" class="quiet-toggle-btn off" onclick="toggleQuietMode()">OFF</button>
                </div>
                <div id="quiet-mode-settings" style="margin-top:10px;">
                    <div class="row-group">
                        <label style="font-size:12px; color:#666; white-space:nowrap;">開始:</label>
                        <input type="time" id="quiet-start" value="23:00" style="flex:1; margin-top:0;">
                        <label style="font-size:12px; color:#666; white-space:nowrap;">終了:</label>
                        <input type="time" id="quiet-end" value="07:00" style="flex:1; margin-top:0;">
                    </div>
                    <div style="font-size:11px; color:#aaa; margin-top:6px;">設定した時間帯は通知をミュートします</div>
                </div>
            </div>
            <div style="margin-top:24px; border-top:1px solid #eee; padding-top:16px;">
                <label style="font-weight:bold; font-size:14px;">💾 データ管理</label>
                <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">
                    <button onclick="exportData()" class="data-mgmt-btn">📤 設定を保存する</button>
                    <button onclick="document.getElementById('import-file-input').click()" class="data-mgmt-btn">📥 設定を読み込む</button>
                    <input type="file" id="import-file-input" accept=".json" style="display:none;">
                </div>
            </div>
        </div>
    </div>

    <div class="right-column" style="flex:1.5; width: 100%;">
        <div class="panel">
            <h2 style="margin:0 0 15px 0; color:#444; font-size: 1.3rem; text-align:center;">💼 推し事管理 💼</h2>
            <div class="row-group">
                <input type="date" id="date-input" style="flex:1.5;">
                <input type="time" id="time-input" style="flex:1;">
            </div>
            <!-- [FIX #15] 日時未入力の注意表示 -->
            <div class="warn-msg" id="datetime-warn">⚠️ 通知するには日付と時刻の両方を入力してください</div>
            <div class="row-group">
                <label>🔁 再通知:</label>
                <select id="interval-input">

                    <option value="0">なし</option>
                    <option value="5">5分ごと</option>
                    <option value="10">10分ごと</option>
                    <option value="15">15分ごと</option>
                    <option value="30">30分ごと</option>
                    <option value="60">1時間ごと</option>
                    <option value="180">3時間ごと</option>
                    <option value="360">6時間ごと</option>
                    <option value="720">12時間ごと</option>
                    <option value="1440">1日ごと</option>
                </select>
            </div>
            <div class="row-group">
                <label>🔔 再通知の上限:</label>
                <select id="max-notify-input">
                    <option value="0">無制限</option>
                    <option value="3">3回</option>
                    <option value="5">5回</option>
                    <option value="10">10回</option>
                </select>
            </div>
            <div class="row-group">
                <label>⭐ 推しを選択:</label>
                <select id="oshi-select">
                    <option value="-1">未選択</option>
                </select>
            </div>
            <div class="main-event-row">
                <input type="checkbox" id="main-event-input">
                <label for="main-event-input">⭐ メインイベント（カウントダウン対象）</label>
            </div>
            <input type="text" id="todo-input" placeholder="次のお仕事（推し事）は何？">
            <button id="add-btn">タスクを追加</button>
        </div>
        <ul id="todo-list"></ul>

        <div class="archive-section" style="margin-top: 10px;">
            <div class="archive-header">
                <h3>📦 完了アーカイブ (<span id="archive-count">0</span>)</h3>
                <button class="toggle-archive-btn" onclick="toggleArchive()">▼ 表示</button>
                <button class="clear-archive-btn" onclick="clearArchive()">全削除</button>
            </div>
            <ul id="archive-list" style="display:none;"></ul>
        </div>
    </div>
</div>

<script>
try {
    const fileInput       = document.getElementById('file-input');
    const todoInput       = document.getElementById('todo-input');
    const dateInput       = document.getElementById('date-input');
    const timeInput       = document.getElementById('time-input');
    const intervalInput   = document.getElementById('interval-input');
    const maxNotifyInput  = document.getElementById('max-notify-input');
    const oshiSelect      = document.getElementById('oshi-select');
    const mainEventInput  = document.getElementById('main-event-input');
    const addBtn          = document.getElementById('add-btn');
    const todoList        = document.getElementById('todo-list');
    const collectionContainer = document.getElementById('collection-container');
    const datetimeWarn    = document.getElementById('datetime-warn');
    const imgLoading      = document.getElementById('img-loading');

    let imageCollection = [];
    let taskList        = [];
    let archivedTasks   = [];
    let praiseList      = ["天才！", "最高！", "さすがだよ！", "偉すぎる！"];
    let remindList      = ["時間だよー！", "忘れてない？", "今から頑張ろう！"];
    let editIndex       = -1;
    let audioCtx;
    let showerActive    = false; // [FIX #16] 多重エフェクト防止フラグ

    // ─── AudioContext ───────────────────────────────────────────────────
    function initAudio() {
        if (!audioCtx) {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {
                console.warn("AudioContext初期化失敗:", e);
            }
        }
    }
    function playBeep() {
        if (!audioCtx) return;
        try {
            const osc  = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = "sine";
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            osc.stop(audioCtx.currentTime + 0.5);
        } catch(e) {
            console.warn("beep失敗:", e);
        }
    }

    // [FIX #11] iOS対応: mousedown + touchstart 両方で初期化
    document.body.addEventListener('mousedown',  initAudio, { once: true });
    document.body.addEventListener('touchstart', initAudio, { once: true });

    // ─── おやすみモード ──────────────────────────────────────────────────
    let quietMode = { enabled: false, start: '23:00', end: '07:00' };

    function isQuietTime() {
        if (!quietMode.enabled) return false;
        const now   = new Date();
        const cur   = now.getHours() * 60 + now.getMinutes();
        const [sh, sm] = quietMode.start.split(':').map(Number);
        const [eh, em] = quietMode.end.split(':').map(Number);
        const start = sh * 60 + sm;
        const end   = eh * 60 + em;
        return start <= end ? (cur >= start && cur < end) : (cur >= start || cur < end);
    }

    function toggleQuietMode() {
        quietMode.enabled = !quietMode.enabled;
        saveQuietMode();
        renderQuietMode();
    }

    function saveQuietMode() {
        localStorage.setItem('oshigoto_quietmode', JSON.stringify(quietMode));
    }

    function renderQuietMode() {
        const btn = document.getElementById('quiet-mode-toggle');
        btn.textContent = quietMode.enabled ? 'ON' : 'OFF';
        btn.className   = `quiet-toggle-btn ${quietMode.enabled ? 'on' : 'off'}`;
    }

    // ─── エクスポート/インポート ──────────────────────────────────────────
    function exportData() {
        const payload = {
            tasks:    taskList,
            archived: archivedTasks,
            praises:  praiseList.join(','),
            reminds:  remindList.join(','),
            images:   imageCollection,
            bgcolor:  localStorage.getItem('oshigoto_bgcolor') || '#f8f9fa'
        };
        const json = JSON.stringify(payload, null, 2);
        const now  = new Date();
        const pad  = n => String(n).padStart(2, '0');
        const stamp = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
        const blob = new Blob([json], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `oshigoto_backup_${stamp}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    document.getElementById('import-file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!confirm('現在のデータをこのファイルで上書きしますか？\nこの操作は取り消せません。')) {
            e.target.value = '';
            return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data      = JSON.parse(ev.target.result);
                taskList        = data.tasks    || [];
                archivedTasks   = data.archived || [];
                praiseList      = (data.praises || "天才！,最高！,さすが！").split(',').map(s => s.trim()).filter(Boolean);
                remindList      = (data.reminds || "時間だよー！,頑張ろう！").split(',').map(s => s.trim()).filter(Boolean);
                imageCollection = data.images   || [];
                saveData();
                if (data.bgcolor) setBgColor(data.bgcolor);
                renderCollection();
                renderTasks();
                renderArchive();
                renderPhraseList('praise');
                renderPhraseList('remind');
                alert('データを読み込みました。');
            } catch (err) {
                alert('ファイルの読み込みに失敗しました。\n正しいバックアップファイルか確認してください。');
            }
            e.target.value = '';
        };
        reader.readAsText(file);
    });

    // ─── 背景色 ──────────────────────────────────────────────────────────
    function setBgColor(color) {
        document.body.style.backgroundColor = color;
        const picker = document.getElementById('bg-color-input');
        if (picker) picker.value = color;
        document.querySelectorAll('.color-swatch').forEach(s => {
            s.classList.toggle('active', s.dataset.color === color);
        });
        localStorage.setItem('oshigoto_bgcolor', color);
    }

    // ─── 推し管理 ────────────────────────────────────────────────────────
    let oshiList       = [];
    let mainOshiIndex  = 0;

    function setOshiColor(color) {
        document.getElementById('oshi-color-input').value = color;
    }

    function saveOshiData() {
        localStorage.setItem('oshigoto_oshi', JSON.stringify({ list: oshiList, main: mainOshiIndex }));
    }

    function addOshi() {
        const nameInput  = document.getElementById('oshi-name-input');
        const colorInput = document.getElementById('oshi-color-input');
        const name = nameInput.value.trim();
        if (!name) { alert('推しの名前を入力してください。'); return; }
        if (oshiList.length >= 5) { alert('推しは最大5人まで登録できます。'); return; }
        oshiList.push({ name, color: colorInput.value });
        nameInput.value = '';
        saveOshiData();
        renderOshiList();
    }

    function deleteOshi(idx) {
        if (!confirm(`「${oshiList[idx].name}」を削除しますか？`)) return;
        oshiList.splice(idx, 1);
        if (mainOshiIndex >= oshiList.length) mainOshiIndex = 0;
        else if (mainOshiIndex > idx) mainOshiIndex--;
        saveOshiData();
        renderOshiList();
    }

    function setMainOshi(idx) {
        mainOshiIndex = idx;
        saveOshiData();
        renderOshiList();
    }

    function renderOshiList() {
        const container = document.getElementById('oshi-list');
        const addBtn    = document.getElementById('oshi-add-btn');
        if (addBtn) {
            addBtn.disabled     = oshiList.length >= 5;
            addBtn.style.opacity = oshiList.length >= 5 ? '0.4' : '1';
        }
        container.innerHTML = '';
        if (oshiList.length === 0) {
            container.innerHTML = '<div style="font-size:12px; color:#bbb; text-align:center; padding:8px;">推しを登録してください</div>';
            return;
        }
        oshiList.forEach((oshi, idx) => {
            const isMain = idx === mainOshiIndex;
            const div = document.createElement('div');
            div.className = 'oshi-item';
            div.innerHTML = `
                <span style="font-size:16px;">${isMain ? '★' : '☆'}</span>
                <div class="oshi-color-dot" style="background:${escapeHtml(oshi.color)};"></div>
                <span class="oshi-name">${escapeHtml(oshi.name)}</span>
                ${isMain
                    ? '<span style="font-size:11px; color:#c8a000; font-weight:bold; white-space:nowrap;">メイン推し</span>'
                    : `<button class="oshi-main-btn" data-idx="${idx}">メイン</button>`}
                <button class="oshi-delete-btn" data-idx="${idx}">削除</button>`;
            container.appendChild(div);
        });
        container.querySelectorAll('.oshi-main-btn').forEach(btn => {
            btn.addEventListener('click', () => setMainOshi(parseInt(btn.dataset.idx)));
        });
        container.querySelectorAll('.oshi-delete-btn').forEach(btn => {
            btn.addEventListener('click', () => deleteOshi(parseInt(btn.dataset.idx)));
        });
        renderOshiSelect();
    }

    function renderOshiSelect() {
        const current = oshiSelect.value;
        oshiSelect.innerHTML = '<option value="-1">未選択</option>';
        oshiList.forEach((oshi, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.textContent = oshi.name;
            oshiSelect.appendChild(opt);
        });
        if ([...oshiSelect.options].some(o => o.value === current)) {
            oshiSelect.value = current;
        }
    }

    // ─── 設定パネル開閉 ──────────────────────────────────────────────────
    function toggleSettings() {
        const area = document.getElementById('settings-area');
        area.style.display = (area.style.display === "block") ? "none" : "block";
    }

    // ─── localStorage 保存 ───────────────────────────────────────────────
    function saveData() {
        try {
            const payload = JSON.stringify({
                tasks:    taskList,
                archived: archivedTasks,
                praises:  praiseList.join(','),
                reminds:  remindList.join(','),
                images:   imageCollection
            });
            // [FIX #2] 保存前にサイズ確認（5MBを上限の目安に）
            const sizeKB = (new Blob([payload]).size / 1024).toFixed(0);
            if (sizeKB > 4500) {
                alert(`⚠️ データが大きすぎます（${sizeKB}KB）。\n古い画像を削除してから保存してください。`);
                return false;
            }
            localStorage.setItem('oshigoto_v_stable', payload);
            return true;
        } catch (e) {
            if (e.name === 'QuotaExceededError') {
                alert("💾 保存容量がいっぱいです！\n画像を削除してから再度お試しください。");
            } else {
                console.error("保存エラー:", e);
                alert("保存中にエラーが発生しました。");
            }
            return false;
        }
    }

    // ─── セリフ管理 ──────────────────────────────────────────────────────
    function togglePhrase(type) {
        const body = document.getElementById(`${type}-phrase-body`);
        const btn  = document.getElementById(`toggle-${type}-btn`);
        if (body.style.display === 'none') {
            body.style.display = 'block';
            btn.textContent = '▲ 非表示';
        } else {
            body.style.display = 'none';
            btn.textContent = '▼ 表示';
        }
    }

    function getList(type) { return type === 'praise' ? praiseList : remindList; }

    function renderPhraseList(type) {
        const MAX_PHRASES = 20;
        const list  = getList(type);
        const ul    = document.getElementById(`${type}-phrase-list`);
        const addBtn2 = document.querySelector(`#${type}-phrase-body .phrase-add-btn`);
        if (addBtn2) {
            addBtn2.disabled = list.length >= MAX_PHRASES;
            addBtn2.style.opacity = list.length >= MAX_PHRASES ? '0.4' : '1';
        }
        ul.innerHTML = '';
        list.forEach((phrase, idx) => {
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${escapeHtml(phrase)}</span>
                <button class="phrase-edit-btn" data-type="${type}" data-idx="${idx}">編集</button>
                <button class="phrase-delete-btn" data-type="${type}" data-idx="${idx}">削除</button>`;
            ul.appendChild(li);
        });
        ul.querySelectorAll('.phrase-edit-btn').forEach(btn => {
            btn.addEventListener('click', () => editPhrase(btn.dataset.type, parseInt(btn.dataset.idx)));
        });
        ul.querySelectorAll('.phrase-delete-btn').forEach(btn => {
            btn.addEventListener('click', () => deletePhrase(btn.dataset.type, parseInt(btn.dataset.idx)));
        });
    }

    function addPhrase(type) {
        const MAX_PHRASES = 20;
        const input = document.getElementById(`${type}-new-input`);
        const text  = input.value.trim();
        if (!text) return;
        if (getList(type).length >= MAX_PHRASES) {
            alert(`登録できるセリフは最大${MAX_PHRASES}件です。`);
            return;
        }
        getList(type).push(text);
        input.value = '';
        saveData();
        renderPhraseList(type);
    }

    function editPhrase(type, idx) {
        const list    = getList(type);
        const newText = prompt('セリフを編集してください', list[idx]);
        if (newText === null) return;
        const trimmed = newText.trim();
        if (!trimmed) return;
        list[idx] = trimmed;
        saveData();
        renderPhraseList(type);
    }

    function clearPhrases(type) {
        const label = type === 'praise' ? '褒め言葉' : 'リマインダー';
        if (getList(type).length === 0) return;
        if (!confirm(`${label}をすべて削除しますか？`)) return;
        if (type === 'praise') praiseList = [];
        else remindList = [];
        saveData();
        renderPhraseList(type);
    }

    function deletePhrase(type, idx) {
        const list = getList(type);
        if (!confirm(`「${list[idx]}」を削除しますか？`)) return;
        list.splice(idx, 1);
        saveData();
        renderPhraseList(type);
    }

    // ─── タスク描画 ──────────────────────────────────────────────────────
    function escapeHtml(str) {
        // [FIX #5] XSS対策: テキストをエスケープ
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function formatInterval(min) {
        if (!min || min === 0) return null;
        const map = {5:'5分ごと',10:'10分ごと',15:'15分ごと',30:'30分ごと',60:'1時間ごと',180:'3時間ごと',360:'6時間ごと',720:'12時間ごと',1440:'1日ごと'};
        return map[min] || `${min}分ごと`;
    }

    function renderTasks() {
        taskList.sort((a, b) => {
            const timeA = (a.date || '9999-12-31') + (a.time || '23:59');
            const timeB = (b.date || '9999-12-31') + (b.time || '23:59');
            return timeA.localeCompare(timeB);
        });
        todoList.innerHTML = '';
        taskList.forEach((task, idx) => {
            const li = document.createElement('li');
            // [FIX #5] task.textをescapeHtmlで安全化
            const notifyDone   = task.maxNotify > 0 && (task.notifyCount || 0) >= task.maxNotify;
            const intervalText = formatInterval(task.interval);
            const maxText      = task.maxNotify > 0 ? `上限${task.maxNotify}回` : '無制限';
            const countText    = task.notifyCount > 0 ? `(${task.notifyCount}回通知済)` : '';
            const notifyInfo   = intervalText
                ? `<div style="font-size:10px; color:#aaa; margin-top:2px;">🔁 ${intervalText} / ${maxText} ${countText}</div>`
                : '';
            li.innerHTML = `
                <div style="flex:1">
                    <div style="font-size:11px; color:#999">${escapeHtml(task.date || '')} ${escapeHtml(task.time || '')}</div>
                    ${notifyInfo}
                    <div style="font-weight:bold;">${task.isMain ? '⭐ ' : ''}${escapeHtml(task.text)}</div>
                    ${notifyDone ? '<span class="notify-done-badge">🔕 通知終了</span>' : ''}
                </div>
                <div class="btn-group">
                    <button class="edit-task-btn" data-idx="${idx}">修正</button>
                    <button class="complete-btn" data-idx="${idx}">完了！</button>
                    <button class="delete-task-btn" data-idx="${idx}">削除</button>
                </div>`;
            const oshi = (task.oshiIdx != null && task.oshiIdx >= 0 && task.oshiIdx < oshiList.length)
                ? oshiList[task.oshiIdx] : null;
            li.style.borderLeftColor = oshi ? oshi.color : '#AAAAAA';
            todoList.appendChild(li);
        });

        // イベント委譲でボタンを処理
        todoList.querySelectorAll('.edit-task-btn').forEach(btn => {
            btn.addEventListener('click', () => startEdit(parseInt(btn.dataset.idx)));
        });
        todoList.querySelectorAll('.complete-btn').forEach(btn => {
            btn.addEventListener('click', () => completeTask(parseInt(btn.dataset.idx)));
        });
        todoList.querySelectorAll('.delete-task-btn').forEach(btn => {
            btn.addEventListener('click', () => deleteTask(parseInt(btn.dataset.idx)));
        });

        document.title = taskList.length > 0 ? `(${taskList.length}) 推し事管理` : '推し事管理';
        renderCountdown();
    }

    // ─── カウントダウン ──────────────────────────────────────────────────
    let countdownTarget = null;

    function renderCountdown() {
        const now = new Date();
        const candidates = taskList.filter(t => t.isMain && t.date && t.time)
            .map(t => ({ ...t, dt: new Date(`${t.date}T${t.time}`) }))
            .filter(t => t.dt > now)
            .sort((a, b) => a.dt - b.dt);

        const area = document.getElementById('countdown-area');
        if (candidates.length === 0) {
            area.style.display = 'none';
            countdownTarget = null;
            return;
        }

        countdownTarget = candidates[0];
        area.style.display = 'block';

        // 推し色をカードに反映
        const oshi = (countdownTarget.oshiIdx != null && countdownTarget.oshiIdx >= 0 && countdownTarget.oshiIdx < oshiList.length)
            ? oshiList[countdownTarget.oshiIdx] : null;
        const baseColor = oshi ? oshi.color : '#AAAAAA';
        const card = document.querySelector('.countdown-card');
        card.style.background = `linear-gradient(135deg, ${baseColor}, ${baseColor}bb)`;
        card.style.boxShadow  = `0 5px 20px ${baseColor}66`;

        const targetDt = countdownTarget.dt;
        const diff = targetDt - now;
        const days  = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const mins  = Math.floor((diff % 3600000) / 60000);
        const secs  = Math.floor((diff % 60000) / 1000);

        document.getElementById('countdown-label').textContent = `🎯 ${countdownTarget.text}まで`;
        document.getElementById('countdown-timer').textContent =
            days > 0
                ? `${days}日 ${hours}時間 ${mins}分 ${String(secs).padStart(2,'0')}秒`
                : `${hours}時間 ${mins}分 ${String(secs).padStart(2,'0')}秒`;

        const targetDate = countdownTarget.date;
        const beforeCount = taskList.filter(t => {
            if (t.isMain) return false;
            if (!t.date) return false;
            if (t.time) return new Date(`${t.date}T${t.time}`) < targetDt;
            return t.date < targetDate;
        }).length;
        document.getElementById('countdown-tasks').textContent =
            beforeCount > 0 ? `📋 それまでにやること ${beforeCount}件` : '';
    }

    function deleteTask(idx) {
        const taskName = taskList[idx] ? taskList[idx].text : '';
        if (!confirm(`「${taskName}」を削除しますか？\nアーカイブには残りません。`)) return;
        if (editIndex === idx) {
            editIndex = -1;
            addBtn.textContent = "タスクを追加";
            addBtn.classList.remove('edit-mode');
        } else if (editIndex > idx) {
            editIndex--;
        }
        taskList.splice(idx, 1);
        saveData();
        renderTasks();
    }

    // ─── タスク追加・編集 ────────────────────────────────────────────────
    addBtn.addEventListener('click', () => {
        initAudio();
        const text = todoInput.value.trim();
        if (!text) return;

        // 日付と時刻の入力チェック
        // メインイベントは両方必須。通常タスクは時刻なし（日付のみ or 両方なし）を許可
        const hasDate = !!dateInput.value;
        const hasTime = !!timeInput.value;
        const isMainEvt = mainEventInput.checked;
        if (!hasDate && hasTime) {
            datetimeWarn.textContent = '⚠️ 時刻を設定する場合は日付も入力してください';
            datetimeWarn.style.display = 'block';
            return;
        }
        if (isMainEvt && hasDate && !hasTime) {
            datetimeWarn.textContent = '⚠️ メインイベントには日付と時刻の両方を入力してください';
            datetimeWarn.style.display = 'block';
            return;
        }
        datetimeWarn.style.display = 'none';

        // 日付と時刻が両方入力されている場合のみ過去日時チェック
        if (hasDate && hasTime) {
            const inputDateTime = new Date(`${dateInput.value}T${timeInput.value}`);
            if (inputDateTime < new Date()) {
                if (!confirm('⚠️ 過去の日時のため再通知設定ができません。メモとして登録しますか？')) return;
            }
        }

        const taskData = {
            text,
            date:         dateInput.value,
            time:         timeInput.value,
            interval:     parseInt(intervalInput.value),
            maxNotify:    parseInt(maxNotifyInput.value),
            notifyCount:  0,
            lastNotified: null,
            oshiIdx:      parseInt(oshiSelect.value),
            isMain:       mainEventInput.checked
        };

        if (editIndex > -1) {
            taskList[editIndex] = taskData;
            editIndex = -1;
            addBtn.textContent = "タスクを追加";
            addBtn.classList.remove('edit-mode');
        } else {
            taskList.push(taskData);
        }

        todoInput.value = '';
        dateInput.value = '';
        timeInput.value = '';
        intervalInput.value = "0";
        maxNotifyInput.value = "0";
        oshiSelect.value = "-1";
        mainEventInput.checked = false;
        saveData();
        renderTasks();
    });

    // ─── 編集開始 ────────────────────────────────────────────────────────
    function startEdit(idx) {
        const task = taskList[idx];
        todoInput.value    = task.text;
        dateInput.value    = task.date;
        timeInput.value    = task.time;
        intervalInput.value  = task.interval  || "0";
        maxNotifyInput.value = task.maxNotify || "0";
        oshiSelect.value       = (task.oshiIdx != null) ? task.oshiIdx : "-1";
        mainEventInput.checked = !!task.isMain;
        editIndex              = idx;
        addBtn.textContent = "修正を保存する";
        addBtn.classList.add('edit-mode');
        todoInput.focus();
    }

    // ─── タスク完了 ──────────────────────────────────────────────────────
    function completeTask(idx) {
        const taskName = taskList[idx] ? taskList[idx].text : '';

        // [FIX #6] 編集中インデックスのズレを防止
        if (editIndex === idx) {
            editIndex = -1;
            addBtn.textContent = "タスクを追加";
            addBtn.classList.remove('edit-mode');
        } else if (editIndex > idx) {
            editIndex--;
        }

        const completedTask = taskList[idx];
        const now = new Date();
        const completedAt = now.toLocaleDateString('sv-SE') + ' ' + now.toTimeString().slice(0, 5);
        archivedTasks.unshift({ ...completedTask, completedAt });

        showShowerEffect(praiseList.join(','), `「${taskName}」完了おめでとう！`);
        taskList.splice(idx, 1);
        saveData();
        renderTasks();
        renderArchive();
    }

    // ─── アーカイブ表示切替 ──────────────────────────────────────────────
    function toggleArchive() {
        const list = document.getElementById('archive-list');
        const btn  = document.querySelector('.toggle-archive-btn');
        if (list.style.display === 'none') {
            list.style.display = 'block';
            btn.textContent = '▲ 非表示';
        } else {
            list.style.display = 'none';
            btn.textContent = '▼ 表示';
        }
    }

    // ─── アーカイブ全削除 ────────────────────────────────────────────────
    function clearArchive() {
        if (archivedTasks.length === 0) return;
        if (!confirm(`アーカイブ内の ${archivedTasks.length} 件を全削除しますか？`)) return;
        archivedTasks = [];
        saveData();
        renderArchive();
    }

    // ─── アーカイブ個別削除 ──────────────────────────────────────────────
    function deleteArchiveItem(idx) {
        const taskName = archivedTasks[idx] ? archivedTasks[idx].text : '';
        if (!confirm(`「${taskName}」をアーカイブから削除しますか？\nこの操作は取り消せません。`)) return;
        archivedTasks.splice(idx, 1);
        saveData();
        renderArchive();
    }

    // ─── アーカイブからタスクを復元 ──────────────────────────────────────
    function restoreTask(idx) {
        const task = archivedTasks[idx];
        const { completedAt, ...restored } = task;
        taskList.push(restored);
        archivedTasks.splice(idx, 1);
        saveData();
        renderTasks();
        renderArchive();
    }

    // ─── アーカイブ描画 ──────────────────────────────────────────────────
    function renderArchive() {
        const archiveList  = document.getElementById('archive-list');
        const archiveCount = document.getElementById('archive-count');
        archiveCount.textContent = archivedTasks.length;
        archiveList.innerHTML = '';

        if (archivedTasks.length === 0) {
            archiveList.innerHTML = '<li style="color:#bbb; font-size:13px; justify-content:center; border-left:none; background:none; box-shadow:none;">完了済みタスクはありません</li>';
            return;
        }

        archivedTasks.forEach((task, idx) => {
            const li = document.createElement('li');
            li.innerHTML = `
                <div style="flex:1">
                    <div style="font-size:11px; color:#bbb">${escapeHtml(task.date || '')} ${escapeHtml(task.time || '')}</div>
                    <div style="font-weight:bold; color:#888; text-decoration:line-through;">${escapeHtml(task.text)}</div>
                    <div class="completed-at">✅ 完了: ${escapeHtml(task.completedAt || '')}</div>
                </div>
                <div class="archive-btn-group">
                    <button class="restore-btn" data-idx="${idx}">↩ 元に戻す</button>
                    <button class="archive-delete-btn" data-idx="${idx}">削除</button>
                    <div class="archive-delete-note">削除すると元に戻せません</div>
                </div>`;
            archiveList.appendChild(li);
        });

        archiveList.querySelectorAll('.restore-btn').forEach(btn => {
            btn.addEventListener('click', () => restoreTask(parseInt(btn.dataset.idx)));
        });
        archiveList.querySelectorAll('.archive-delete-btn').forEach(btn => {
            btn.addEventListener('click', () => deleteArchiveItem(parseInt(btn.dataset.idx)));
        });
    }

    // ─── カウントダウン毎秒更新 ──────────────────────────────────────────
    setInterval(() => {
        if (countdownTarget) renderCountdown();
    }, 1000);

    // ─── 通知チェック（setInterval） ────────────────────────────────────
    // [FIX #14] Page Visibility APIでバックグラウンド時はスキップ
    setInterval(() => {
        if (document.hidden) return;
        if (isQuietTime()) return;

        const now         = new Date();
        const nowStrDate  = now.toLocaleDateString('sv-SE');
        const nowStrTime  = now.toTimeString().slice(0, 5);
        const nowTotal    = now.getHours() * 60 + now.getMinutes();

        taskList.forEach(task => {
            if (!task.date || !task.time) return;
            const max       = task.maxNotify || 0;
            const count     = task.notifyCount || 0;
            if (max > 0 && count >= max) return; // 上限到達済みはスキップ
            const isInitial  = (task.date === nowStrDate && task.time === nowStrTime);
            const isRepeat   = (
                task.interval > 0 &&
                task.lastNotified !== null &&
                (nowTotal - task.lastNotified) >= task.interval
            );
            // おやすみモード中にスキップされた通知を終了後に発火する
            const taskDateTime = new Date(`${task.date}T${task.time}`);
            const isMissed   = (
                task.interval > 0 &&
                task.lastNotified === null &&
                taskDateTime < now
            );
            if ((isInitial || isRepeat || isMissed) && task.lastNotified !== nowTotal) {
                task.lastNotified = nowTotal;
                task.notifyCount  = count + 1;
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                playBeep();
                showShowerEffect(remindList.join(','), `時間だよ！「${task.text}」！`);
                saveData();
                if (max > 0 && task.notifyCount >= max) renderTasks(); // 上限到達時にバッジ表示
            }
        });
    }, 5000);

    // ─── エフェクト表示 ──────────────────────────────────────────────────
    function showShowerEffect(wordSource, topWord) {
        // [FIX #16] 多重エフェクト防止
        if (showerActive) return;
        showerActive = true;

        // [FIX #17] words が空のときのフォールバック
        const words = (wordSource || '').split(',').map(w => w.trim()).filter(Boolean);
        const safeWords = words.length > 0 ? words : ['やったね！'];

        const overlay  = document.getElementById('praise-overlay');
        const praiseEl = document.getElementById('praise-img');

        // [FIX #7] 画像なしでも動くように
        if (imageCollection.length > 0) {
            praiseEl.src = imageCollection[Math.floor(Math.random() * imageCollection.length)];
            overlay.style.display = 'flex';
        }

        for (let i = 0; i < 15; i++) {
            setTimeout(() => {
                const wordDiv = document.createElement('div');
                wordDiv.className = 'shower-word';
                wordDiv.textContent = (i === 0 && topWord) ? topWord : safeWords[Math.floor(Math.random() * safeWords.length)];
                wordDiv.style.left = (Math.random() * 70 + 15) + "%";
                wordDiv.style.top  = (Math.random() * 70 + 15) + "%";
                document.body.appendChild(wordDiv);
                // [FIX #16] 削除確実に実施
                setTimeout(() => { if (wordDiv.parentNode) wordDiv.parentNode.removeChild(wordDiv); }, 2200);
            }, i * 150);
        }

        startFireworks();
        setTimeout(() => {
            overlay.style.display = 'none';
            showerActive = false;
        }, 4500);
    }

    // [FIX #19] オーバーレイクリックで手動クローズ
    document.getElementById('praise-overlay').addEventListener('click', () => {
        document.getElementById('praise-overlay').style.display = 'none';
        showerActive = false;
    });

    // ─── 画像ファイル読み込み ────────────────────────────────────────────
    // [FIX #1, #4, #20] 複数ファイル対応 + ファイル未選択チェック + Canvasリサイズ
    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files || []);
        if (files.length === 0) return; // [FIX #4] キャンセル時は何もしない

        const MAX_IMAGES = 10;
        if (imageCollection.length >= MAX_IMAGES) {
            alert(`画像は最大${MAX_IMAGES}枚までです。\n追加するには既存の画像を削除してください。`);
            fileInput.value = '';
            return;
        }

        const MAX_W  = 400;
        const MAX_H  = 400;
        const MAX_KB = 200; // 1枚あたりの最大KB

        imgLoading.style.display = 'block';
        let processed = 0;

        files.forEach(file => {
            // [FIX #1] 画像をCanvasでリサイズしてからbase64保存
            if (!file.type.startsWith('image/')) {
                processed++;
                if (processed === files.length) imgLoading.style.display = 'none';
                return;
            }

            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                URL.revokeObjectURL(url);

                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;

                // アスペクト比を維持してリサイズ
                if (w > MAX_W || h > MAX_H) {
                    const ratio = Math.min(MAX_W / w, MAX_H / h);
                    w = Math.round(w * ratio);
                    h = Math.round(h * ratio);
                }
                canvas.width  = w;
                canvas.height = h;
                const ctx2d = canvas.getContext('2d');
                ctx2d.drawImage(img, 0, 0, w, h);

                // 品質を下げながらMAX_KB以内に収める
                let quality  = 0.85;
                let dataUrl  = canvas.toDataURL('image/jpeg', quality);
                while ((dataUrl.length * 0.75 / 1024) > MAX_KB && quality > 0.3) {
                    quality -= 0.1;
                    dataUrl = canvas.toDataURL('image/jpeg', quality);
                }

                if (imageCollection.length < MAX_IMAGES) {
                    imageCollection.push(dataUrl);
                } else if (processed === 0) {
                    alert(`画像は最大${MAX_IMAGES}枚までです。上限に達したため追加できませんでした。`);
                }
                processed++;
                if (processed === files.length) {
                    imgLoading.style.display = 'none';
                    renderCollection();
                    saveData();
                }
            };
            img.onerror = () => {
                URL.revokeObjectURL(url);
                processed++;
                if (processed === files.length) {
                    imgLoading.style.display = 'none';
                    renderCollection();
                    saveData();
                }
                alert(`「${file.name}」の読み込みに失敗しました。`);
            };
            img.src = url;
        });

        // input をリセットして同じファイルを再度選択できるように
        fileInput.value = '';
    });

    // ─── 画像コレクション描画 ────────────────────────────────────────────
    function renderCollection() {
        collectionContainer.innerHTML = '';
        imageCollection.forEach((imgSrc, idx) => {
            const div  = document.createElement('div');
            div.className = 'collection-item';
            const img  = document.createElement('img');
            img.src    = imgSrc;
            img.alt    = `推し画像${idx + 1}`;
            const span = document.createElement('span');
            span.className   = 'delete-img';
            span.textContent = '×';
            span.addEventListener('click', () => deleteImage(idx));
            div.appendChild(img);
            div.appendChild(span);
            collectionContainer.appendChild(div);
        });

        const isFull = imageCollection.length >= 10;
        fileInput.disabled = isFull;
        fileInput.style.opacity = isFull ? '0.4' : '1';
        fileInput.style.cursor  = isFull ? 'not-allowed' : '';
    }

    function deleteImage(idx) {
        if (!confirm('この画像を削除しますか？')) return;
        imageCollection.splice(idx, 1);
        renderCollection();
        saveData();
    }

    // ─── データ初期化 ────────────────────────────────────────────────────
    // [FIX #18] 確認ダイアログを追加
    function resetImages() {
        if (!confirm('⚠️ 登録した推し画像をすべて削除しますか？\nタスクは消えません。この操作は取り消せません。')) return;
        imageCollection = [];
        saveData();
        renderCollection();
    }

    function resetTasks() {
        if (!confirm('⚠️ タスクとアーカイブをすべて削除しますか？\n画像は消えません。この操作は取り消せません。')) return;
        taskList = [];
        archivedTasks = [];
        editIndex = -1;
        addBtn.textContent = "タスクを追加";
        addBtn.classList.remove('edit-mode');
        saveData();
        renderTasks();
        renderArchive();
    }

    // ─── データ読み込み ──────────────────────────────────────────────────
    // [FIX #9] window.onload → addEventListener
    window.addEventListener('load', () => {
        const saved = localStorage.getItem('oshigoto_v_stable');
        if (saved) {
            // [FIX #3] JSON.parse を try-catch で保護
            try {
                const data        = JSON.parse(saved);
                imageCollection   = data.images   || [];
                taskList          = data.tasks    || [];
                archivedTasks     = data.archived || [];
                praiseList = (data.praises || "天才！,最高！,さすが！").split(',').map(s => s.trim()).filter(Boolean);
                remindList = (data.reminds || "時間だよー！,頑張ろう！").split(',').map(s => s.trim()).filter(Boolean);
                renderCollection();
                renderTasks();
                renderArchive();
                renderPhraseList('praise');
                renderPhraseList('remind');
            } catch (parseErr) {
                console.error("データ読み込みエラー:", parseErr);
                alert("保存データが破損していたため読み込めませんでした。\n初期状態で起動します。");
                localStorage.removeItem('oshigoto_v_stable');
            }
        }

        renderPhraseList('praise');
        renderPhraseList('remind');

        const savedBgColor = localStorage.getItem('oshigoto_bgcolor') || '#f8f9fa';
        setBgColor(savedBgColor);

        document.querySelectorAll('.color-swatch').forEach(swatch => {
            swatch.addEventListener('click', () => setBgColor(swatch.dataset.color));
        });
        document.getElementById('bg-color-input').addEventListener('input', (e) => setBgColor(e.target.value));

        // [FIX #12] CanvasサイズをアニメーションONの前に確実に設定
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        animate();
    });

    // [FIX #15] 日付/時刻 入力変化時に警告を消す
    todoInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addBtn.click(); });
    document.getElementById('praise-new-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') addPhrase('praise'); });
    document.getElementById('remind-new-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') addPhrase('remind'); });

    // 推し管理の読み込み
    const savedOshi = localStorage.getItem('oshigoto_oshi');
    if (savedOshi) { try { const d = JSON.parse(savedOshi); oshiList = d.list || []; mainOshiIndex = d.main || 0; } catch(e) {} }
    renderOshiList();
    document.getElementById('oshi-name-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') addOshi(); });

    // おやすみモードの読み込みと時刻変更保存
    const savedQuiet = localStorage.getItem('oshigoto_quietmode');
    if (savedQuiet) { try { quietMode = JSON.parse(savedQuiet); } catch(e) {} }
    document.getElementById('quiet-start').value = quietMode.start;
    document.getElementById('quiet-end').value   = quietMode.end;
    renderQuietMode();
    document.getElementById('quiet-start').addEventListener('change', (e) => { quietMode.start = e.target.value; saveQuietMode(); });
    document.getElementById('quiet-end').addEventListener('change',   (e) => { quietMode.end   = e.target.value; saveQuietMode(); });
    dateInput.addEventListener('input', () => { datetimeWarn.style.display = 'none'; });
    timeInput.addEventListener('input', () => { datetimeWarn.style.display = 'none'; });

    // ─── 花火アニメーション ──────────────────────────────────────────────
    const canvas = document.getElementById('fireworks');
    const ctx    = canvas.getContext('2d');
    let particles = [];

    function startFireworks() {
        particles = [];
        for (let i = 0; i < 80; i++) {
            particles.push({
                x:  window.innerWidth  / 2,
                y:  window.innerHeight / 2,
                dx: (Math.random() - 0.5) * 20,
                dy: (Math.random() - 0.5) * 20,
                c:  `hsl(${Math.random() * 360},100%,60%)`,
                l:  100
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // [FIX #8] forEach + splice → filter に変更してインデックスズレを防止
        particles = particles.filter(p => {
            p.x  += p.dx;
            p.y  += p.dy;
            p.dy += 0.1;
            p.l  -= 1;
            if (p.l <= 0) return false;
            ctx.fillStyle   = p.c;
            ctx.globalAlpha = p.l / 100;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
            ctx.fill();
            return true;
        });
        ctx.globalAlpha = 1;

        requestAnimationFrame(animate);
    }

    // [FIX #9] window.onresize → addEventListener
    window.addEventListener('resize', () => {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    });

} catch (criticalError) {
    console.error("Critical Start Error:", criticalError);
    alert("起動時にエラーが発生しました。\nページを再読み込みするか、データを初期化してください。");
}
</script>
